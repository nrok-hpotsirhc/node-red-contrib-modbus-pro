<script type="text/javascript">
    RED.nodes.registerType('modbus-read', {
        category: 'modbus',
        color: '#E9967A',
        defaults: {
            name: { value: '' },
            server: { value: '', type: 'modbus-client-config', required: true },
            fc: { value: '3' },
            address: { value: 0, validate: RED.validators.number() },
            quantity: { value: 1, validate: RED.validators.number() },
            addressOffset: { value: 'zero-based' },
            pollInterval: { value: 0, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 1,
        icon: 'serial.svg',
        paletteLabel: 'modbus read',
        label: function () {
            if (this.name) {
                return this.name;
            }
            var fcLabels = {
                '1': 'FC1 Coils',
                '2': 'FC2 DI',
                '3': 'FC3 HR',
                '4': 'FC4 IR'
            };
            var fc = fcLabels[this.fc] || 'FC' + this.fc;
            return fc + ' @' + (this.address || 0) + ' x' + (this.quantity || 1);
        },
        oneditprepare: function () {
            var fcSelect = $('#node-input-fc');
            var addressInput = $('#node-input-address');
            var addressOffsetSelect = $('#node-input-addressOffset');
            var addressHint = $('#modbus-read-address-hint');

            function updateAddressHint() {
                var fc = parseInt(fcSelect.val(), 10);
                var offset = addressOffsetSelect.val();
                var addr = parseInt(addressInput.val(), 10);
                if (!Number.isFinite(addr)) {
                    addr = 0;
                }

                var protocolAddr = (offset === 'one-based') ? Math.max(0, addr - 1) : addr;

                var prefixes = { 1: '0', 2: '1', 3: '4', 4: '3' };
                var prefix = prefixes[fc] || '';

                if (offset === 'one-based') {
                    addressHint.text('Datasheet: ' + prefix + String(addr).padStart(4, '0') + ' → Protocol: ' + protocolAddr);
                } else {
                    addressHint.text('Protocol address: ' + protocolAddr);
                }
            }

            fcSelect.on('change', updateAddressHint);
            addressInput.on('change keyup', updateAddressHint);
            addressOffsetSelect.on('change', updateAddressHint);
            updateAddressHint();
        }
    });
</script>

<script type="text/html" data-template-name="modbus-read">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Modbus Read">
    </div>

    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-cog"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>

    <div class="form-row">
        <label for="node-input-fc"><i class="fa fa-list"></i> Function Code</label>
        <select id="node-input-fc">
            <option value="1">FC 01 – Read Coils</option>
            <option value="2">FC 02 – Read Discrete Inputs</option>
            <option value="3">FC 03 – Read Holding Registers</option>
            <option value="4">FC 04 – Read Input Registers</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-address"><i class="fa fa-map-marker"></i> Start Address</label>
        <input type="text" id="node-input-address" placeholder="0">
    </div>

    <div class="form-row">
        <label for="node-input-quantity"><i class="fa fa-sort-numeric-asc"></i> Quantity</label>
        <input type="text" id="node-input-quantity" placeholder="1">
    </div>

    <div class="form-row">
        <label for="node-input-addressOffset"><i class="fa fa-arrows-h"></i> Address Mode</label>
        <select id="node-input-addressOffset">
            <option value="zero-based">Zero-based (protocol)</option>
            <option value="one-based">One-based (datasheet)</option>
        </select>
    </div>

    <div class="form-row" id="modbus-read-address-hint-row">
        <label>&nbsp;</label>
        <span id="modbus-read-address-hint" style="color: #888; font-size: 0.9em;"></span>
    </div>

    <div class="form-row">
        <label for="node-input-pollInterval"><i class="fa fa-clock-o"></i> Poll Interval (ms)</label>
        <input type="text" id="node-input-pollInterval" placeholder="0 = trigger only">
    </div>
</script>

<script type="text/html" data-help-name="modbus-read">
    <p>Reads data from a Modbus device using function codes FC 01–04.</p>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Server <span class="property-type">config node</span></dt>
        <dd>The Modbus client configuration that defines the connection parameters.</dd>
        <dt>Function Code <span class="property-type">select</span></dt>
        <dd>
            <table>
                <tr><td><b>FC 01</b></td><td>Read Coils (boolean outputs, max 2000)</td></tr>
                <tr><td><b>FC 02</b></td><td>Read Discrete Inputs (boolean inputs, max 2000)</td></tr>
                <tr><td><b>FC 03</b></td><td>Read Holding Registers (read/write 16-bit, max 125)</td></tr>
                <tr><td><b>FC 04</b></td><td>Read Input Registers (read-only 16-bit, max 125)</td></tr>
            </table>
        </dd>
        <dt>Start Address <span class="property-type">number</span></dt>
        <dd>Starting register or coil address. Default: <code>0</code>. Interpretation depends on Address Mode.</dd>
        <dt>Quantity <span class="property-type">number</span></dt>
        <dd>Number of coils or registers to read. Max: 2000 for coils (FC 01/02), 125 for registers (FC 03/04). Default: <code>1</code></dd>
        <dt>Address Mode <span class="property-type">select</span></dt>
        <dd>
            <b>Zero-based (protocol):</b> Address is used directly. Address 0 = first register.<br>
            <b>One-based (datasheet):</b> Datasheet convention (e.g. 40001). The node subtracts 1 automatically.
        </dd>
        <dt>Poll Interval <span class="property-type">number</span></dt>
        <dd>
            Automatic polling interval in milliseconds. Set to <code>0</code> for trigger-only
            mode (reads only when a message arrives). Max: 86400000 (24 h). Default: <code>0</code>
        </dd>
    </dl>

    <h3>Input</h3>
    <p>Any incoming message triggers a read operation. The message content is ignored; only
       <code>msg.topic</code> is preserved in the output.</p>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Standardized response object:</dd>
    </dl>
    <pre>{
  "data": [1234, 5678],
  "buffer": "&lt;Buffer 04 d2 16 2e&gt;",
  "fc": 3,
  "fcName": "readHoldingRegisters",
  "address": 107,
  "quantity": 2,
  "unitId": 1,
  "timestamp": "2026-04-16T10:00:00.000Z",
  "connection": "tcp://192.168.1.100:502"
}</pre>
    <dl class="message-properties">
        <dt>payload.data <span class="property-type">number[] | boolean[]</span></dt>
        <dd>Array of register values (FC 03/04) or coil states (FC 01/02).</dd>
        <dt>payload.buffer <span class="property-type">Buffer</span></dt>
        <dd>Raw response bytes for custom parsing (endianness conversion, Float32, etc.).</dd>
        <dt>payload.fc <span class="property-type">number</span></dt>
        <dd>Function code used for this read.</dd>
        <dt>payload.address <span class="property-type">number</span></dt>
        <dd>Zero-based protocol address that was read.</dd>
        <dt>payload.quantity <span class="property-type">number</span></dt>
        <dd>Number of items actually read.</dd>
        <dt>payload.unitId <span class="property-type">number</span></dt>
        <dd>Modbus unit ID of the target device.</dd>
        <dt>payload.timestamp <span class="property-type">string</span></dt>
        <dd>ISO 8601 timestamp of the response.</dd>
        <dt>payload.connection <span class="property-type">string</span></dt>
        <dd>Connection identifier, e.g. <code>tcp://192.168.1.100:502</code> or <code>rtu:///dev/ttyUSB0</code>.</dd>
    </dl>
    <dl class="message-properties">
        <dt>modbusRead <span class="property-type">object</span></dt>
        <dd>Metadata: <code>fc</code>, <code>address</code>, <code>protocolAddress</code>,
            <code>quantity</code>, <code>unitId</code>, <code>addressOffset</code>.</dd>
    </dl>

    <h3>Status Indicators</h3>
    <table>
        <tr><td>🟢 green/dot</td><td>Last read successful – shows register count and address</td></tr>
        <tr><td>🔵 blue/dot</td><td>Read in progress</td></tr>
        <tr><td>🔴 red/ring</td><td>Error (timeout, transport not connected, invalid FC)</td></tr>
        <tr><td>⚪ grey/dot</td><td>Ready, waiting for trigger or first poll</td></tr>
    </table>

    <h3>Error Behavior</h3>
    <ul>
        <li><b>Transport not connected:</b> Error is reported via <code>node.error()</code> and the catch node.</li>
        <li><b>Timeout:</b> The configured timeout (from the config node) applies. On timeout, the read fails with an error.</li>
        <li><b>Overlapping reads:</b> If a poll fires while a previous read is still in progress, the poll is skipped with a warning.</li>
        <li><b>Repeated poll errors:</b> Identical consecutive errors are throttled to avoid flooding the debug log.</li>
    </ul>

    <h3>Details</h3>
    <p>
        <b>Address Offset:</b> Modbus uses zero-based addressing at the protocol level, but
        device datasheets use one-based notation with type prefixes (e.g. 40001 = first holding
        register). Use "One-based" mode to enter addresses as shown in your datasheet – the
        node converts automatically.
    </p>
    <p>
        <b>Polling vs. Trigger:</b> With <code>pollInterval &gt; 0</code>, the node polls automatically.
        With <code>pollInterval = 0</code>, it reads only when a message arrives at the input.
        Both modes can be combined: the poll runs on its interval, and additional reads are
        triggered by incoming messages.
    </p>

    <h3>References</h3>
    <ul>
        <li><a href="https://modbus.org/specs.php">Modbus Application Protocol V1.1b3</a> – FC 01–04 specification</li>
    </ul>
</script>
