<script type="text/javascript">
    RED.nodes.registerType('modbus-write', {
        category: 'modbus',
        color: '#E9967A',
        defaults: {
            name: { value: '' },
            server: { value: '', type: 'modbus-client-config', required: true },
            fc: { value: '6' },
            address: { value: 0, validate: RED.validators.number() },
            addressOffset: { value: 'zero-based' },
            readAddress: { value: 0, validate: RED.validators.number() },
            readQuantity: { value: 1, validate: RED.validators.number() },
            queueMaxSize: { value: 100, validate: RED.validators.number() },
            queueDropStrategy: { value: 'fifo' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'serial.svg',
        paletteLabel: 'modbus write',
        label: function () {
            if (this.name) {
                return this.name;
            }
            var fcLabels = {
                '5': 'FC5 Coil',
                '6': 'FC6 Reg',
                '15': 'FC15 Coils',
                '16': 'FC16 Regs',
                '22': 'FC22 Mask',
                '23': 'FC23 R/W'
            };
            var fc = fcLabels[this.fc] || 'FC' + this.fc;
            return fc + ' @' + (this.address || 0);
        },
        oneditprepare: function () {
            var fcSelect = $('#node-input-fc');
            var addressInput = $('#node-input-address');
            var addressOffsetSelect = $('#node-input-addressOffset');
            var addressHint = $('#modbus-write-address-hint');
            var valueHint = $('#modbus-write-value-hint');
            var fc23Rows = $('.modbus-write-fc23-row');

            function updateVisibility() {
                var fc = parseInt(fcSelect.val(), 10);
                if (fc === 23) {
                    fc23Rows.show();
                } else {
                    fc23Rows.hide();
                }
            }

            function updateAddressHint() {
                var fc = parseInt(fcSelect.val(), 10);
                var offset = addressOffsetSelect.val();
                var addr = parseInt(addressInput.val(), 10);
                if (!Number.isFinite(addr)) {
                    addr = 0;
                }

                var protocolAddr = (offset === 'one-based') ? Math.max(0, addr - 1) : addr;

                var prefixes = { 5: '0', 6: '4', 15: '0', 16: '4', 22: '4', 23: '4' };
                var prefix = prefixes[fc] || '';
                var addrLabel = (fc === 23) ? 'Write address' : 'Address';

                if (offset === 'one-based') {
                    addressHint.text(addrLabel + ': ' + prefix + String(addr).padStart(4, '0') + ' → Protocol: ' + protocolAddr);
                } else {
                    addressHint.text(addrLabel + ' (protocol): ' + protocolAddr);
                }
            }

            function updateValueHint() {
                var fc = parseInt(fcSelect.val(), 10);
                var hints = {
                    5: 'msg.payload: boolean, 0/1, or 0xFF00/0x0000',
                    6: 'msg.payload: integer (0–65535)',
                    15: 'msg.payload: boolean array, e.g. [true, false, true]',
                    16: 'msg.payload: integer array, e.g. [100, 200, 300]',
                    22: 'msg.payload: { andMask: 0xFFFF, orMask: 0x0000 }',
                    23: 'msg.payload: integer array (write values), e.g. [100, 200]'
                };
                valueHint.text(hints[fc] || 'msg.payload: value(s) to write');
            }

            fcSelect.on('change', function () {
                updateVisibility();
                updateAddressHint();
                updateValueHint();
            });
            addressInput.on('change keyup', updateAddressHint);
            addressOffsetSelect.on('change', updateAddressHint);
            updateVisibility();
            updateAddressHint();
            updateValueHint();
        }
    });
</script>

    <div class="form-row">
        <label for="node-input-queueMaxSize"><i class="fa fa-database"></i> Queue Size</label>

    <div class="form-row">

            <option value="lifo">LIFO – Drop newest (alarm events)</option>
        </select>
    </div>
</script>

<script type="text/html" data-help-name="modbus-write">
    <p>Writes data to a Modbus device using function codes FC 05, 06, 15, 16, 22, or 23.</p>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Server <span class="property-type">config node</span></dt>
        <dd>The Modbus client configuration that defines the connection parameters.</dd>
        <dt>Function Code <span class="property-type">select</span></dt>
        <dd>
            <table>
                <tr><td><b>FC 05</b></td><td>Write Single Coil (boolean output)</td></tr>
                <tr><td><b>FC 06</b></td><td>Write Single Register (16-bit value, 0–65535)</td></tr>
                <tr><td><b>FC 15</b></td><td>Write Multiple Coils (boolean array, max 1968)</td></tr>
                <tr><td><b>FC 16</b></td><td>Write Multiple Registers (16-bit array, max 123)</td></tr>
                <tr><td><b>FC 22</b></td><td>Mask Write Register (atomic AND/OR bitmask on a holding register)</td></tr>
                <tr><td><b>FC 23</b></td><td>Read/Write Multiple Registers (combined write + read in one PDU)</td></tr>
            </table>
        </dd>
        <dt>Start Address <span class="property-type">number</span></dt>
        <dd>Starting register or coil address. Default: <code>0</code>. Interpretation depends on Address Mode.</dd>
        <dt>Address Mode <span class="property-type">select</span></dt>
        <dd>
            <b>Zero-based (protocol):</b> Address is used directly.<br>
            <b>One-based (datasheet):</b> The node subtracts 1 automatically.
        </dd>
        <dt>Queue Size <span class="property-type">number</span></dt>
        <dd>Maximum number of pending write requests. Range: 1–10000. Default: <code>100</code></dd>
        <dt>Drop Strategy <span class="property-type">select</span></dt>
        <dd>
            <b>FIFO:</b> Drops the oldest message when full – ideal for sensor/telemetry data where only the latest value matters.<br>
            <b>LIFO:</b> Drops the newest (incoming) message when full – ideal for alarm events where order must be preserved.
        </dd>
    </dl>

    <h3>Input</h3>
    <p>The value to write is taken from <code>msg.payload</code>. The expected format depends on the function code:</p>
    <dl class="message-properties">
        <dt>FC 05 – Single Coil <span class="property-type">boolean | number</span></dt>
        <dd><code>true</code>/<code>false</code>, <code>1</code>/<code>0</code>, or <code>0xFF00</code>/<code>0x0000</code></dd>
        <dt>FC 06 – Single Register <span class="property-type">number</span></dt>
        <dd>Integer value 0–65535</dd>
        <dt>FC 15 – Multiple Coils <span class="property-type">boolean[]</span></dt>
        <dd>Array of boolean values, e.g. <code>[true, false, true]</code>. Max length: 1968.</dd>
        <dt>FC 16 – Multiple Registers <span class="property-type">number[]</span></dt>
        <dd>Array of integer values (0–65535 each), e.g. <code>[100, 200, 300]</code>. Max length: 123.</dd>
        <dt>FC 22 – Mask Write Register <span class="property-type">object</span></dt>
        <dd>Object with <code>andMask</code> and <code>orMask</code> (0x0000–0xFFFF each), e.g. <code>{ andMask: 0xFFFF, orMask: 0x0010 }</code>.
            Formula: <code>result = (current AND andMask) OR (orMask AND NOT andMask)</code></dd>
        <dt>FC 23 – Read/Write Registers <span class="property-type">number[]</span></dt>
        <dd>Array of integer values to write (0–65535 each), e.g. <code>[100, 200]</code>. Max length: 121.
            Read address and quantity are configured in the node editor.</dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Standardized write confirmation:</dd>
    </dl>
    <pre>{
  "fc": 6,
  "fcName": "writeSingleRegister",
  "address": 100,
  "quantity": 1,
  "value": 42,
  "unitId": 1,
  "timestamp": "2026-04-16T10:00:00.000Z",
  "connection": "tcp://192.168.1.100:502"
}</pre>
    <dl class="message-properties">
        <dt>modbusWrite <span class="property-type">object</span></dt>
        <dd>Metadata: <code>fc</code>, <code>address</code>, <code>protocolAddress</code>,
            <code>value</code>, <code>unitId</code>, <code>addressOffset</code>.</dd>
    </dl>

    <h3>Backpressure Queue</h3>
    <p>
        Write requests are queued to prevent flooding the Modbus bus. If messages arrive
        faster than the device can process them, the queue buffers pending requests.
    </p>
    <ul>
        <li><b>FIFO drop:</b> When full, the oldest pending request is discarded and its
            error is reported via <code>done(err)</code>.</li>
        <li><b>LIFO drop:</b> When full, the new incoming request is rejected immediately.</li>
    </ul>
    <p>Queue statistics (dropped count, utilization) are emitted as warnings.</p>

    <h3>Status Indicators</h3>
    <table>
        <tr><td>🟢 green/dot</td><td>Last write successful – shows FC and address</td></tr>
        <tr><td>🔵 blue/dot</td><td>Write in progress</td></tr>
        <tr><td>🟡 yellow/ring</td><td>Queue above 80% capacity – shows fill level</td></tr>
        <tr><td>🔴 red/ring</td><td>Error (transport not connected, invalid value, queue full)</td></tr>
        <tr><td>⚪ grey/dot</td><td>Ready, waiting for input message</td></tr>
    </table>

    <h3>Error Behavior</h3>
    <ul>
        <li><b>Invalid payload:</b> Rejected immediately with a descriptive error (e.g. "FC 06 requires integer 0-65535").</li>
        <li><b>Transport not connected:</b> Error reported via <code>done(err)</code> and the catch node.</li>
        <li><b>Queue full (LIFO):</b> Incoming message is rejected with "Queue full, message dropped".</li>
        <li><b>Queue full (FIFO):</b> Oldest queued message is discarded; new message is enqueued.</li>
    </ul>

    <h3>References</h3>
    <ul>
        <li><a href="https://modbus.org/specs.php">Modbus Application Protocol V1.1b3</a> – FC 05, 06, 15, 16, 22, 23 specification</li>
    </ul>
</script>
